# Observability Stack for Learning Environment
# Resource-constrained versions of Istio sample addons
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: istio-system

resources:
  - prometheus.yaml
  - grafana.yaml
  - kiali.yaml
  - jaeger.yaml
  - loki.yaml
  - promtail.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: istio-observability
      environment: learning
    includeSelectors: false

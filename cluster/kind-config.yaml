# Kind cluster configuration for Istio learning environment
# Optimized for 32GB RAM machine
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: istio-learning
nodes:
  # Control plane node with ingress port mappings
  - role: control-plane
    image: kindest/node:v1.34.3@sha256:08497ee19eace7b4b5348db5c6a1591d7752b164530a36f855cb0f2bdcbadd48
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # HTTP traffic for Istio ingress gateway
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # HTTPS traffic for Istio ingress gateway
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # NodePort range for additional services if needed
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP
      - containerPort: 30001
        hostPort: 30001
        protocol: TCP
  # Single worker node (sufficient for learning, saves resources)
  - role: worker
    image: kindest/node:v1.34.3@sha256:08497ee19eace7b4b5348db5c6a1591d7752b164530a36f855cb0f2bdcbadd48
